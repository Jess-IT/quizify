<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quizify</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.6.0/mammoth.browser.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f7f7f5;
    --surface: #ffffff;
    --surface2: #f0f0ed;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a1a;
    --text2: #6b6b6b;
    --accent: #4F46E5;
    --accent-dark: #4338CA;
    --accent-light: rgba(79,70,229,0.08);
    --green: #16a34a;
    --green-light: rgba(22,163,74,0.08);
    --red: #dc2626;
    --red-light: rgba(220,38,38,0.08);
    --radius: 12px;
    --radius-lg: 16px;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem 4rem;
  }

  .app {
    max-width: 640px;
    margin: 0 auto;
  }

  /* HEADER */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
  }
  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 32px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -1.5px;
  }
  .logo span { color: var(--accent); }
  .tagline {
    font-size: 13px;
    color: var(--text2);
    margin-top: 6px;
  }



  /* UPLOAD ZONE */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    background: var(--surface2);
    position: relative;
  }
  .upload-zone:hover, .upload-zone.drag {
    border-color: var(--accent);
    background: var(--accent-light);
  }
  .upload-zone input {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer; width: 100%; height: 100%;
  }
  .upload-icon {
    width: 44px; height: 44px;
    margin: 0 auto 14px;
    background: rgba(79,70,229,0.12);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .upload-icon svg {
    width: 22px; height: 22px;
    stroke: var(--accent); fill: none; stroke-width: 2;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .upload-title { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
  .upload-sub { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .file-badges { display: flex; gap: 8px; justify-content: center; }
  .badge {
    font-family: 'Space Mono', monospace;
    font-size: 11px; font-weight: 700;
    padding: 3px 12px;
    border-radius: 20px;
  }
  .badge-pdf { background: rgba(220,38,38,0.1); color: var(--red); }
  .badge-docx { background: rgba(37,99,235,0.1); color: #2563eb; }
  .file-chosen {
    margin-top: 12px;
    font-size: 13px; font-weight: 500;
    color: var(--accent);
    display: none;
  }
  .file-chosen.show { display: block; }

  /* SETTINGS */
  .settings {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin: 1rem 0;
  }
  .setting-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }
  .setting-label {
    font-size: 11px; font-weight: 500;
    color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .setting-card select {
    width: 100%;
    background: transparent; border: none;
    font-family: 'Sora', sans-serif;
    font-size: 14px; font-weight: 500;
    color: var(--text); cursor: pointer; outline: none;
  }

  /* GENERATE BUTTON */
  .gen-btn {
    width: 100%; padding: 14px;
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius);
    font-family: 'Sora', sans-serif;
    font-size: 15px; font-weight: 500;
    cursor: pointer; transition: all 0.2s;
    margin-top: 4px;
  }
  .gen-btn:hover:not(:disabled) { background: var(--accent-dark); transform: translateY(-1px); }
  .gen-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

  /* ERROR */
  .error-msg {
    background: var(--red-light);
    border: 0.5px solid rgba(220,38,38,0.3);
    border-radius: var(--radius);
    padding: 12px 16px;
    font-size: 13px; color: var(--red);
    margin-top: 12px; display: none;
    line-height: 1.5;
  }

  /* LOADING */
  .loading {
    text-align: center; padding: 4rem 1rem; display: none;
  }
  .spinner {
    width: 38px; height: 38px;
    border: 2.5px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 14px; color: var(--text2); }

  /* QUIZ */
  .quiz-section { display: none; }
  .quiz-header {
    display: flex; align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
  }
  .quiz-title {
    font-family: 'Space Mono', monospace;
    font-size: 18px; font-weight: 700;
    color: var(--text);
  }
  .score-badge {
    font-family: 'Space Mono', monospace;
    font-size: 13px; font-weight: 700;
    background: var(--accent-light); color: var(--accent);
    padding: 5px 14px; border-radius: 20px;
  }

  /* QUESTION CARD */
  .question-card {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }
  .q-num {
    font-size: 11px; font-weight: 500;
    color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 15px; font-weight: 500;
    color: var(--text); line-height: 1.6;
    margin-bottom: 16px;
  }
  .options { display: flex; flex-direction: column; gap: 8px; }
  .opt {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px;
    border: 0.5px solid var(--border);
    border-radius: var(--radius);
    cursor: pointer; transition: all 0.15s;
    background: var(--surface2);
    font-family: 'Sora', sans-serif;
    font-size: 13px; color: var(--text); text-align: left;
    width: 100%;
  }
  .opt:hover:not(:disabled) { border-color: var(--accent); background: var(--accent-light); }
  .opt.correct { border-color: var(--green); background: var(--green-light); color: var(--green); font-weight: 500; }
  .opt.wrong { border-color: var(--red); background: var(--red-light); color: var(--red); }
  .opt:disabled { cursor: default; }
  .opt-letter {
    width: 24px; height: 24px;
    border-radius: 7px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
    font-family: 'Space Mono', monospace;
    color: var(--text2);
  }
  .explanation {
    margin-top: 12px; padding: 10px 14px;
    background: var(--accent-light);
    border-radius: 8px;
    font-size: 12px; color: var(--text2); line-height: 1.7;
    display: none;
    border-left: 2px solid var(--accent);
  }

  /* RESULT */
  .result-bar {
    background: var(--surface);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 2rem; text-align: center;
    margin-top: 1.5rem;
  }
  .result-score {
    font-family: 'Space Mono', monospace;
    font-size: 42px; font-weight: 700; color: var(--accent);
  }
  .result-label { font-size: 14px; color: var(--text2); margin-top: 6px; }
  .restart-btn {
    margin-top: 20px;
    padding: 11px 28px;
    background: transparent;
    border: 0.5px solid var(--border2);
    border-radius: var(--radius);
    font-family: 'Sora', sans-serif;
    font-size: 13px; cursor: pointer;
    color: var(--text); transition: all 0.2s;
  }
  .restart-btn:hover { background: var(--surface2); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="logo">Quiz<span>ify</span></div>
    <div class="tagline">upload a file. get a quiz. it's that simple.</div>
  </div>

  <!-- UPLOAD SECTION -->
  <div id="upload-section">

    <!-- UPLOAD ZONE -->
    <div class="upload-zone" id="dropzone">
      <input type="file" id="file-input" accept=".pdf,.docx,application/pdf,application/vnd.openxmlformats-officedocument.wordprocessingml.document" />
      <div class="upload-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
      </div>
      <div class="upload-title">Drop your file here</div>
      <div class="upload-sub">Accepted formats:</div>
      <div class="file-badges">
        <span class="badge badge-pdf">PDF</span>
        <span class="badge badge-docx">DOCX</span>
      </div>
      <div class="file-chosen" id="file-name-display"></div>
    </div>

    <!-- SETTINGS -->
    <div class="settings">
      <div class="setting-card">
        <div class="setting-label">Questions</div>
        <select id="num-questions">
          <option value="5">5 questions</option>
          <option value="10" selected>10 questions</option>
          <option value="15">15 questions</option>
          <option value="20">20 questions</option>
        </select>
      </div>
      <div class="setting-card">
        <div class="setting-label">Difficulty</div>
        <select id="difficulty">
          <option value="easy">Easy</option>
          <option value="medium" selected>Medium</option>
          <option value="hard">Hard</option>
        </select>
      </div>
    </div>

    <button class="gen-btn" id="gen-btn" disabled>Generate Quiz</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <!-- LOADING -->
  <div class="loading" id="loading-section">
    <div class="spinner"></div>
    <div class="loading-text" id="loading-text">Reading your file...</div>
  </div>

  <!-- QUIZ -->
  <div class="quiz-section" id="quiz-section">
    <div class="quiz-header">
      <div class="quiz-title"></div>
      <div class="score-badge" id="score-badge">0 / 0</div>
    </div>
    <div id="questions-container"></div>
    <div class="result-bar" id="result-bar" style="display:none;">
      <div class="result-score" id="result-score"></div>
      <div class="result-label" id="result-label"></div>
      <button class="restart-btn" onclick="restart()">Try another file</button>
    </div>
  </div>

</div>

<script>
  let fileContent = '';
  // ✏️ PASTE YOUR GROQ API KEY BELOW (get one FREE at https://console.groq.com/keys)
  const apiKey = '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';
  let quizData = [];
  let answered = 0, correct = 0, total = 0;

  const ALLOWED_EXTS = ['.pdf', '.docx'];
  const LOADING_MSGS = ['Reading your file...', 'Analyzing content...', 'Crafting questions...', 'Almost ready!'];

  const fileInput = document.getElementById('file-input');
  const dropzone = document.getElementById('dropzone');
  const genBtn = document.getElementById('gen-btn');
  const fileNameDisplay = document.getElementById('file-name-display');
  const errorMsg = document.getElementById('error-msg');

  function checkReady() {
    genBtn.disabled = !fileContent;
  }

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag'); const f = e.dataTransfer.files[0]; if (f) handleFile(f); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) handleFile(fileInput.files[0]); });

  function isAllowed(file) {
    const ext = '.' + file.name.split('.').pop().toLowerCase();
    return ALLOWED_EXTS.includes(ext);
  }

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    setTimeout(() => errorMsg.style.display = 'none', 6000);
  }

  function handleFile(file) {
    if (!isAllowed(file)) {
      showError('Only PDF and DOCX files are accepted.');
      fileInput.value = '';
      return;
    }
    const ext = '.' + file.name.split('.').pop().toLowerCase();
    fileNameDisplay.textContent = '📄 ' + file.name;
    fileNameDisplay.classList.add('show');
    fileContent = '';
    checkReady();

    if (ext === '.docx') {
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const result = await mammoth.extractRawText({ arrayBuffer: e.target.result });
          fileContent = result.value.trim();
          if (!fileContent) throw new Error('empty');
          checkReady();
        } catch {
          showError('Could not read the DOCX. Make sure the file has text content.');
          fileNameDisplay.classList.remove('show');
          fileContent = '';
        }
      };
      reader.readAsArrayBuffer(file);
    } else {
      // Use PDF.js for proper text extraction
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const reader = new FileReader();
      reader.onload = async e => {
        try {
          const typedArray = new Uint8Array(e.target.result);
          const pdf = await pdfjsLib.getDocument({ data: typedArray }).promise;
          let fullText = '';
          for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
            const page = await pdf.getPage(pageNum);
            const content = await page.getTextContent();
            const pageText = content.items.map(item => item.str).join(' ');
            fullText += pageText + '\n';
          }
          fileContent = fullText.trim();
          if (!fileContent || fileContent.length < 50) throw new Error('empty');
          checkReady();
        } catch {
          showError('Could not read the PDF. Make sure it contains selectable text (not a scanned image).');
          fileNameDisplay.classList.remove('show');
          fileContent = '';
        }
      };
      reader.readAsArrayBuffer(file);
    }
  }

  genBtn.addEventListener('click', generateQuiz);

  async function generateQuiz() {
    const numQ = document.getElementById('num-questions').value;
    const diff = document.getElementById('difficulty').value;

    document.getElementById('upload-section').style.display = 'none';
    const loadingSection = document.getElementById('loading-section');
    loadingSection.style.display = 'block';

    let msgIdx = 0;
    const loadingText = document.getElementById('loading-text');
    const msgInterval = setInterval(() => {
      msgIdx = (msgIdx + 1) % LOADING_MSGS.length;
      loadingText.textContent = LOADING_MSGS[msgIdx];
    }, 1800);

    const prompt = `You are a quiz generator. Based on the following content, generate exactly ${numQ} multiple-choice questions at ${diff} difficulty.

Content:
---
${fileContent.slice(0, 8000)}
---

Return ONLY a valid JSON array (no markdown, no backticks, no explanation) with this exact structure:
[
  {
    "question": "Question text here",
    "options": ["A) option1", "B) option2", "C) option3", "D) option4"],
    "answer": "A",
    "explanation": "Brief explanation of why this is correct."
  }
]

Rules:
- Each question must have exactly 4 options labeled A), B), C), D)
- The "answer" field must be just the letter: A, B, C, or D
- Make questions test understanding, not just trivia
- Return ONLY the JSON array, nothing else`;

    try {
      const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`
        },
        body: JSON.stringify({
          model: 'llama-3.3-70b-versatile',
          max_tokens: 4000,
          temperature: 0.7,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      clearInterval(msgInterval);

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        throw new Error(err.error?.message || 'API error ' + response.status);
      }

      const data = await response.json();
      const text = data.choices?.[0]?.message?.content || '';
      const clean = text.replace(/```json|```/g, '').trim();
      const jsonStart = clean.indexOf('[');
      const jsonEnd = clean.lastIndexOf(']');
      if (jsonStart === -1 || jsonEnd === -1) throw new Error('Invalid response from AI');

      quizData = JSON.parse(clean.slice(jsonStart, jsonEnd + 1));
      total = quizData.length;
      answered = 0; correct = 0;

      loadingSection.style.display = 'none';
      renderQuiz();

    } catch (err) {
      clearInterval(msgInterval);
      loadingSection.style.display = 'none';
      document.getElementById('upload-section').style.display = 'block';
      showError('Failed to generate quiz: ' + err.message);
    }
  }

  function renderQuiz() {
    const container = document.getElementById('questions-container');
    container.innerHTML = '';
    updateScore();

    quizData.forEach((q, qi) => {
      const letters = ['A', 'B', 'C', 'D'];
      const card = document.createElement('div');
      card.className = 'question-card';
      card.innerHTML = `
        <div class="q-num">Question ${qi + 1} of ${total}</div>
        <div class="q-text">${q.question}</div>
        <div class="options">
          ${q.options.map((opt, oi) => `
            <button class="opt" onclick="selectAnswer(${qi}, '${letters[oi]}')" id="opt-${qi}-${letters[oi]}">
              <span class="opt-letter">${letters[oi]}</span>
              ${opt.replace(/^[A-D]\)\s*/, '')}
            </button>
          `).join('')}
        </div>
        <div class="explanation" id="exp-${qi}"><strong>Explanation:</strong> ${q.explanation}</div>
      `;
      container.appendChild(card);
    });

    document.getElementById('quiz-section').style.display = 'block';
    document.getElementById('result-bar').style.display = 'none';
  }

  function selectAnswer(qi, chosen) {
    const q = quizData[qi];
    const letters = ['A', 'B', 'C', 'D'];
    letters.forEach(l => {
      const btn = document.getElementById(`opt-${qi}-${l}`);
      btn.disabled = true;
      if (l === q.answer) btn.classList.add('correct');
      else if (l === chosen && chosen !== q.answer) btn.classList.add('wrong');
    });
    if (chosen === q.answer) correct++;
    answered++;
    updateScore();
    document.getElementById(`exp-${qi}`).style.display = 'block';
    if (answered === total) setTimeout(showResult, 600);
  }

  function updateScore() {
    document.getElementById('score-badge').textContent = `${correct} / ${total}`;
  }

  function showResult() {
    const pct = Math.round((correct / total) * 100);
    const labels = ['Keep studying!', 'Good effort!', 'Well done!', 'Excellent!', 'Perfect score!'];
    const label = pct < 40 ? labels[0] : pct < 60 ? labels[1] : pct < 80 ? labels[2] : pct < 100 ? labels[3] : labels[4];
    document.getElementById('result-score').textContent = `${correct}/${total}`;
    document.getElementById('result-label').textContent = `${pct}% — ${label}`;
    document.getElementById('result-bar').style.display = 'block';
    document.getElementById('result-bar').scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function restart() {
    fileContent = '';
    fileNameDisplay.textContent = '';
    fileNameDisplay.classList.remove('show');
    genBtn.disabled = true;
    fileInput.value = '';
    document.getElementById('quiz-section').style.display = 'none';
    document.getElementById('upload-section').style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
</script>
</body>
</html>
